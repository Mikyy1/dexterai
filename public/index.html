<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DexTerAi - Chat dengan AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">🤖</div>
                    <div>
                        <h1>DexTerAi</h1>
                        <p class="subtitle">Powered by Claude Sonnet 4</p>
                    </div>
                </div>
                <button id="resetBtn" class="btn-reset" title="Reset Chat">🔄</button>
            </div>
        </header>

        <div class="chat-container" id="chatContainer">
            <div class="welcome-message">
                <div class="welcome-icon">✨</div>
                <h2>Selamat Datang!</h2>
                <p>Tanyakan apa saja, saya siap membantu Anda</p>
                <div class="suggestions">
                    <button class="suggestion-btn" data-msg="Jelaskan tentang quantum computing">💡 Jelaskan quantum computing</button>
                    <button class="suggestion-btn" data-msg="Buatkan kode Python untuk web scraping">💻 Bantu coding Python</button>
                    <button class="suggestion-btn" data-msg="Tulis puisi tentang teknologi">✍️ Tulis puisi</button>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="Ketik pesan Anda..." rows="1" maxlength="2000"></textarea>
                <button id="sendBtn" class="btn-send" disabled>📤</button>
            </div>
            <div class="footer-info">
                <span>Created by BINTANG</span>
                <span id="charCount">0/2000</span>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
