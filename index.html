<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DexTer AI - Phantom Thief</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header */
        .header { background: linear-gradient(90deg, #8b0000, #4a0000); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; }
        .logo { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .model-select { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        
        /* Chat Container */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; word-wrap: break-word; }
        .user-message { align-self: flex-end; background: #8b0000; color: white; border-bottom-right-radius: 2px; }
        .bot-message { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .loading { opacity: 0.7; font-style: italic; }
        
        /* Input Area */
        .input-area { background: #111; padding: 15px 20px; border-top: 1px solid #333; display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px 16px; border-radius: 8px; outline: none; font-size: 16px; }
        .chat-input:focus { border-color: #8b0000; }
        .send-btn { background: #8b0000; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .send-btn:hover { background: #a00000; transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Footer */
        .footer { background: #050505; padding: 8px; text-align: center; font-size: 12px; color: #666; border-top: 1px solid #222; }
        
        /* API Key Setup Modal */
        #api-key-setup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .setup-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #8b0000; max-width: 90%; width: 400px; text-align: center; box-shadow: 0 0 30px rgba(139,0,0,0.3); }
        .setup-box h3 { color: #fff; margin-bottom: 15px; font-size: 22px; }
        .setup-box p { color: #aaa; margin-bottom: 20px; font-size: 14px; line-height: 1.6; }
        .setup-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #0a0a0a; color: white; font-size: 14px; }
        .setup-box button { width: 100%; padding: 12px; background: #8b0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: all 0.2s; }
        .setup-box button:hover { background: #a00000; }
    </style>
</head>
<body>
    <!-- API Key Setup Modal -->
    <div id="api-key-setup">
        <div class="setup-box">
            <h3>🔑 Setup OpenRouter API Key</h3>
            <p>DexTer AI membutuhkan API Key untuk berjalan.<br>Masukkan key sekali saja, akan tersimpan permanen di browser ini.</p>
            <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
            <button onclick="saveApiKey()">Save & Reload</button>
        </div>
    </div>

    <!-- Main App -->
    <div class="header">
        <div class="logo">🎭 DEXTER AI</div>
        <select class="model-select" id="model-select">
            <option value="qwen/qwen2.5-coder-32b-instruct:free">Qwen 2.5 Coder (Free)</option>
            <option value="deepseek/deepseek-chat-v3-0324:free">DeepSeek V3 (Free)</option>
            <option value="google/gemma-3-27b-it:free">Gemma 3 27B (Free)</option>
        </select>
    </div>
    
    <div class="chat-container" id="chat-container"></div>
    
    <div class="input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="Tanya sesuatu ke DexTer..." autocomplete="off">
        <button class="send-btn" id="send-btn">Kirim</button>
    </div>
    
    <div class="footer">DEXTER AI • POWERED BY OPENROUTER</div>

    <script src="dexter-core.js"></script>
    <script>
        // Show API key setup modal if key is missing
        if (!localStorage.getItem('OPENROUTER_API_KEY')) {
            document.getElementById('api-key-setup').style.display = 'flex';
        }
        
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key.startsWith('sk-or-v1-')) {
                localStorage.setItem('OPENROUTER_API_KEY', key);
                location.reload();
            } else {
                alert('️ Format API Key tidak valid! Harus dimulai dengan sk-or-v1-');
            }
        }
        
        // Allow Enter key in API input
        document.getElementById('api-key-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveApiKey();
        });
    </script>
</body>
</html>
