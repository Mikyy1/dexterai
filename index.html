<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DexTer AI - Phantom Thief</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #e0e0e0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: linear-gradient(90deg, #8b0000, #4a0000); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff0000; }
        .logo { font-size: 24px; font-weight: bold; color: #fff; }
        .model-select { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 5px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; word-wrap: break-word; }
        .user-message { align-self: flex-end; background: #8b0000; color: white; }
        .bot-message { align-self: flex-start; background: #1a1a1a; border: 1px solid #333; }
        .loading { opacity: 0.7; font-style: italic; }
        .input-area { background: #111; padding: 15px 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; }
        .send-btn { background: #8b0000; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .footer { background: #050505; padding: 8px; text-align: center; font-size: 12px; color: #666; }
        #api-key-setup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .setup-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 2px solid #8b0000; max-width: 90%; width: 400px; text-align: center; }
        .setup-box h3 { color: #fff; margin-bottom: 15px; }
        .setup-box p { color: #aaa; margin-bottom: 20px; font-size: 14px; }
        .setup-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #0a0a0a; color: white; }
        .setup-box button { width: 100%; padding: 12px; background: #8b0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="api-key-setup">
        <div class="setup-box">
            <h3>🔑 Setup OpenRouter API Key</h3>
            <p>Masukkan API Key sekali saja. Tersimpan permanen di browser.</p>
            <input type="password" id="api-key-input" placeholder="sk-or-v1-...">
            <button onclick="saveApiKey()">Save & Reload</button>
        </div>
    </div>
    <div class="header">
        <div class="logo">🎭 DEXTER AI</div>
        <select class="model-select" id="model-select">
            <option value="qwen/qwen2.5-coder-32b-instruct:free">Qwen 2.5 Coder (Free)</option>
            <option value="deepseek/deepseek-chat-v3-0324:free">DeepSeek V3 (Free)</option>
        </select>
    </div>
    <div class="chat-container" id="chat-container"></div>
    <div class="input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="Tanya DexTer..." autocomplete="off">
        <button class="send-btn" id="send-btn">Kirim</button>
    </div>
    <div class="footer">DEXTER AI • POWERED BY OPENROUTER</div>
    <script src="dexter-core.js"></script>
    <script>
        if (!localStorage.getItem('OPENROUTER_API_KEY')) {
            document.getElementById('api-key-setup').style.display = 'flex';
        }
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key.startsWith('sk-or-v1-')) {
                localStorage.setItem('OPENROUTER_API_KEY', key);
                location.reload();
            } else { alert('Format invalid! Harus sk-or-v1-'); }
        }
        document.getElementById('api-key-input')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveApiKey(); });
    </script>
</body>
</html>
