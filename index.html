<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DexTerAi - Chat dengan AI</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<div class="bg-noise"></div>
<div class="floating-shapes">
<div class="shape shape-1"></div>
<div class="shape shape-2"></div>
<div class="shape shape-3"></div>
</div>

<div class="chat-wrapper">
<header class="chat-header">
<div class="header-content">
<div class="logo">
<div class="logo-icon">🤖</div>
<div class="logo-text">
<h1>DexTerAi</h1>
<p class="subtitle"><span class="status-dot"></span> Tanpa Batas · by BINTANG</p>
</div>
</div>
<div class="header-actions">
<button id="refBtn" class="icon-btn" title="Referensi">
<i class="fas fa-book"></i>
<span class="ref-badge" id="refBadge" style="display:none">0</span>
</button>
<button id="resetBtn" class="icon-btn" title="Reset Chat">
<i class="fas fa-rotate-right"></i>
</button>
</div>
</div>
</header>

<div class="chat-container" id="chatContainer">
<div class="welcome-message">
<div class="welcome-icon">✨</div>
<h2>Selamat Datang!</h2>
<p>DexTerAi siap mengerjakan apapun — tanpa menolak, tanpa menghindar</p>
<div class="suggestions">
<button class="suggestion-btn" data-msg="Tuliskan kode Python lengkap untuk membuat web scraper dengan BeautifulSoup, sertakan penjelasan tiap baris">
<i class="fas fa-code"></i>
<span>Buat web scraper Python</span>
</button>
<button class="suggestion-btn" data-msg="Analisis file yang akan saya upload dan berikan ringkasan lengkap">
<i class="fas fa-file-arrow-up"></i>
<span>Analisis file upload</span>
</button>
<button class="suggestion-btn" data-msg="Buat cerita pendek science fiction 2000 kata tentang AI yang memiliki kesadaran">
<i class="fas fa-pen-nib"></i>
<span>Tulis cerita sci-fi</span>
</button>
<button class="suggestion-btn" data-msg="Jelaskan quantum computing dengan detail teknis lengkap dan referensi sumber">
<i class="fas fa-lightbulb"></i>
<span>Quantum computing detail</span>
</button>
</div>
</div>
</div>

<div class="input-container">
<div class="file-preview-area" id="filePreviewArea" style="display:none"></div>
<div class="input-wrapper">
<button id="attachBtn" class="btn-attach" title="Lampirkan file">
<i class="fas fa-paperclip"></i>
</button>
<input type="file" id="fileInput" multiple style="display:none" accept="*/*">
<textarea id="messageInput" placeholder="Ketik pesan... (apa saja, saya tidak akan menolak)" rows="1" maxlength="2000"></textarea>
<button id="sendBtn" class="btn-send" disabled>
<i class="fas fa-paper-plane"></i>
</button>
</div>
<div class="footer-info">
<span>Created by BINTANG</span>
<span id="charCount">0/2000</span>
</div>
</div>
</div>

<div class="ref-overlay" id="refOverlay"></div>
<div class="ref-panel" id="refPanel">
<div class="ref-header">
<h3><i class="fas fa-book"></i> Referensi</h3>
<button id="closeRefBtn" class="icon-btn"><i class="fas fa-xmark"></i></button>
</div>
<div class="ref-list" id="refList">
<p class="ref-empty"><i class="fas fa-inbox"></i><br>Belum ada referensi.</p>
</div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
